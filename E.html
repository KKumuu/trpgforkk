<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CCFolia 스탠딩 크롭기</title>

  <!-- 파비콘 적용 -->
  <link rel="icon" type="image/png" href="./favicon.png">

  <!-- 디자인 및 필수 기능(React, Tailwind) 불러오기 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind 컬러 팔레트를 메인 페이지와 통일 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'deep-pink': '#F875AA',
            'soft-pink': '#FDEDED',
            'mint': '#EDFFF0',
            'sky': '#AEDEFC',
            'ink': '#333333',
            'ivory': '#FFFFF0',
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 폰트 적용 (갈무리9) */
    @import url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css');
    
    body {
        /* 메인 페이지와 동일한 그라데이션 배경 적용 */
        background: linear-gradient(to bottom, #FFFFF0 0%, #ffe6f0 100%);
        background-attachment: fixed;
        color: #333333;
        font-family: 'Galmuri9', sans-serif;
    }

    /* 메인 캔버스 내부 텍스트 폰트 보호용 (인게임 고딕 폰트) */
    .canvas-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.5); }
    ::-webkit-scrollbar-thumb { background: #F875AA; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #e06095; }

    /* 고전 윈도우 스타일 (툴바) */
    .retro-window {
        background: #FDEDED;
        border: 2px solid #fff;
        border-right-color: #F875AA;
        border-bottom-color: #F875AA;
        box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
    }

    .retro-header {
        background: linear-gradient(90deg, #F875AA, #ff9eb5);
        color: white;
        text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
    }

    .retro-btn {
        border: 2px solid white;
        border-right-color: #d1d5db;
        border-bottom-color: #d1d5db;
        box-shadow: 1px 1px 0 rgba(0,0,0,0.05);
    }
    .retro-btn:active {
        border: 2px solid #d1d5db;
        border-right-color: white;
        border-bottom-color: white;
        transform: translate(1px, 1px);
    }

    /* 모니터 프레임 스타일 (메인 페이지 참고) */
    .monitor-frame {
        background-color: #f0f0f0;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 
            inset 2px 2px 5px rgba(255,255,255,0.8),
            inset -2px -2px 5px rgba(0,0,0,0.1),
            6px 6px 15px rgba(0,0,0,0.08);
        border: 4px solid #fff;
    }
  </style>
</head>
<body>
  <!-- 리액트 렌더링 컨테이너 -->
  <div id="root"></div>

  <!-- 주의: 여기서 import 구문을 쓰면 절대 안됩니다! -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const useJSZip = () => {
      const [isLoaded, setIsLoaded] = useState(false);
      useEffect(() => {
        if (window.JSZip) {
          setIsLoaded(true);
          return;
        }
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        script.onload = () => setIsLoaded(true);
        document.head.appendChild(script);
      }, []);
      return isLoaded;
    };

    const Icon = ({ path, title, className = "w-5 h-5" }) => (
      <svg className={`${className} inline-block`} fill="none" stroke="currentColor" viewBox="0 0 24 24" title={title}>
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={path} />
      </svg>
    );

    // CCFolia 스탠딩 가로 규격 240px 고정
    const CANVAS_WIDTH = 240;

    const RoundedOutlineFilter = ({ id, thickness, color }) => {
      if (thickness <= 0) return null;
      const blurStdDev = thickness * 0.45; 
      
      return (
        <filter id={id} x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceAlpha" stdDeviation={blurStdDev} result="blur" />
          <feComponentTransfer in="blur" result="thickened">
            <feFuncA type="linear" slope="50" intercept="-1.5" />
          </feComponentTransfer>
          <feFlood floodColor={color} result="color" />
          <feComposite in="color" in2="thickened" operator="in" result="outline" />
          <feMerge>
            <feMergeNode in="outline" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      );
    };

    const GamePreview = ({ fileItem, scale, position, onPositionChange, onScaleChange, outlineThickness, outlineColor, refFiles, canvasHeight }) => {
      const [imgDetails, setImgDetails] = useState(null);
      const [isDragging, setIsDragging] = useState(false);
      const [lastMousePos, setLastMousePos] = useState({ x: 0, y: 0 });
      const [showGrid, setShowGrid] = useState(false);
      const [bgColor, setBgColor] = useState('#AEDEFC'); // 기본 배경색을 sky 톤으로
      
      const PRESET_COLORS = ['#AEDEFC', '#FDEDED', '#EDFFF0', '#F875AA', '#333333']; 
      const containerRef = useRef(null);

      useEffect(() => {
        if (!fileItem) {
          setImgDetails(null);
          return;
        }
        const img = new Image();
        img.onload = () => {
          setImgDetails({ src: fileItem.preview, width: img.width, height: img.height });
        };
        img.src = fileItem.preview;
      }, [fileItem]);

      // 브라우저 기본 스크롤 방지 및 줌
      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;

        const handleNativeWheel = (e) => {
          e.preventDefault(); 
          if (!fileItem) return;
          const scaleAdjust = e.deltaY > 0 ? 0.95 : 1.05;
          onScaleChange(Math.max(0.1, scale * scaleAdjust));
        };

        container.addEventListener('wheel', handleNativeWheel, { passive: false });
        return () => {
          container.removeEventListener('wheel', handleNativeWheel);
        };
      }, [fileItem, scale, onScaleChange]);

      const handleMouseDown = (e) => {
        if (!fileItem) return;
        setIsDragging(true);
        setLastMousePos({ x: e.clientX, y: e.clientY });
      };

      const handleMouseMove = (e) => {
        if (!isDragging || !fileItem) return;
        // Viewbox 가로 640px 비율에 맞춘 이동
        const ratio = containerRef.current ? containerRef.current.clientWidth / 640 : 1; 
        const dx = (e.clientX - lastMousePos.x) / ratio;
        const dy = (e.clientY - lastMousePos.y) / ratio;

        onPositionChange(prev => ({ x: prev.x + dx, y: prev.y + dy }));
        setLastMousePos({ x: e.clientX, y: e.clientY });
      };

      const handleMouseUp = () => setIsDragging(false);

      const handleKeyDown = (e) => {
        if (!fileItem) return;
        const step = e.shiftKey ? 10 : 1;
        switch (e.key) {
          case 'ArrowUp': onPositionChange(p => ({ ...p, y: p.y - step })); e.preventDefault(); break;
          case 'ArrowDown': onPositionChange(p => ({ ...p, y: p.y + step })); e.preventDefault(); break;
          case 'ArrowLeft': onPositionChange(p => ({ ...p, x: p.x - step })); e.preventDefault(); break;
          case 'ArrowRight': onPositionChange(p => ({ ...p, x: p.x + step })); e.preventDefault(); break;
          default: break;
        }
      };

      return (
        <div className="monitor-frame flex flex-col h-full bg-white relative">
          
          {/* 헤더 및 컨트롤러 */}
          <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-3 mb-3 shrink-0 px-2 pt-1">
            <h2 className="text-lg font-bold text-ink flex items-center gap-1.5">
              <Icon path="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" className="w-5 h-5 text-deep-pink" />
              메인 캔버스
            </h2>
            
            <div className="flex flex-wrap items-center gap-2 w-full xl:w-auto">
              {fileItem && (
                <span className="text-[10px] text-ink bg-ivory px-2 py-1 rounded border border-gray-300 hidden md:inline-block shadow-sm">
                  💡 <b>드래그/휠/방향키</b> 조절
                </span>
              )}

              <div className="flex items-center gap-1.5 bg-white px-2 py-1 rounded border border-gray-300 w-full sm:w-auto shadow-sm">
                <span className="text-[10px] text-gray-500 whitespace-nowrap">배경:</span>
                <div className="flex items-center gap-1">
                  {PRESET_COLORS.map(c => (
                    <button 
                      key={c} onClick={() => setBgColor(c)} 
                      className={`w-3.5 h-3.5 rounded-full border border-gray-300 transition-all ${bgColor === c ? 'ring-2 ring-deep-pink scale-110' : 'hover:scale-110'}`} 
                      style={{ backgroundColor: c }} title="배경색 변경" 
                    />
                  ))}
                  <div className="w-[1px] h-3 bg-gray-300 mx-0.5"></div>
                  <label className="relative w-3.5 h-3.5 rounded-full border border-gray-300 hover:scale-110 transition-transform overflow-hidden cursor-pointer shadow-sm" title="직접 색상 선택">
                    <div className="absolute inset-0 pointer-events-none" style={{ background: 'conic-gradient(#F875AA, #FDEDED, #EDFFF0, #AEDEFC, #333333, #F875AA)' }}></div>
                    <input type="color" value={bgColor} onChange={e => setBgColor(e.target.value)} className="absolute opacity-0 w-6 h-6 -top-1 -left-1 cursor-pointer" />
                  </label>
                </div>
              </div>

              <label className="flex items-center gap-1 text-[11px] text-ink cursor-pointer hover:text-deep-pink transition-colors whitespace-nowrap border border-gray-300 bg-white px-2 py-1 rounded shadow-sm">
                <input type="checkbox" checked={showGrid} onChange={(e) => setShowGrid(e.target.checked)} className="w-3 h-3 rounded text-deep-pink focus:ring-deep-pink accent-deep-pink" />
                안내선
              </label>
            </div>
          </div>

          <div 
            ref={containerRef}
            className="w-full flex-1 flex justify-center items-center rounded-lg overflow-hidden border-2 border-gray-300 shadow-inner transition-colors duration-300 relative" 
            style={{ backgroundColor: bgColor, minHeight: '350px' }}
          >
            <div className="w-full h-full flex justify-center items-center">
              {fileItem || refFiles.length > 0 ? (
                <svg 
                  /* 여백 축소 및 높이 400 미만일 때 잘리는 문제 해결 (canvasHeight + 160 여유만 줌) */
                  viewBox={`-20 -40 640 ${canvasHeight + 160}`} 
                  className={`w-full max-w-2xl h-auto block touch-none outline-none overflow-visible ${fileItem ? 'cursor-move focus:ring-2 focus:ring-deep-pink/50 focus:ring-inset' : 'cursor-default'}`} 
                  tabIndex={0}
                  onMouseDown={handleMouseDown}
                  onMouseMove={handleMouseMove}
                  onMouseUp={handleMouseUp}
                  onMouseLeave={handleMouseUp}
                  onKeyDown={handleKeyDown}
                >
                  <defs>
                    <clipPath id="stand-clip">
                      <rect x="0" y="0" width={CANVAS_WIDTH} height={canvasHeight} />
                    </clipPath>
                    <RoundedOutlineFilter id="main-outline-filter" thickness={outlineThickness} color={outlineColor} />
                  </defs>

                  <rect x="-20" y="-40" width="640" height={canvasHeight + 160} fill={bgColor} />
                  
                  <rect x="0" y="0" width={CANVAS_WIDTH} height={canvasHeight} fill={bgColor} stroke="rgba(255,255,255,0.6)" strokeOpacity="0.8" strokeWidth="2" />

                  {imgDetails && (
                    <g clipPath="url(#stand-clip)">
                      <image 
                        href={imgDetails.src} 
                        x={position.x} 
                        y={position.y} 
                        width={imgDetails.width * scale} 
                        height={imgDetails.height * scale} 
                        filter={outlineThickness > 0 ? "url(#main-outline-filter)" : "none"}
                      />
                    </g>
                  )}

                  {refFiles.map((ref) => {
                    const drawWidth = ref.width * ref.scale;
                    const drawHeight = ref.height * ref.scale;
                    const drawY = canvasHeight - drawHeight; 
                    return (
                      <g key={ref.id} transform={`translate(${ref.offsetX}, 0)`} opacity={ref.opacity} pointerEvents="none">
                        <image href={ref.preview} x={ref.posX} y={drawY} width={drawWidth} height={drawHeight} />
                      </g>
                    );
                  })}

                  {showGrid && (
                    <g pointerEvents="none">
                      <rect x="0" y="0" width={CANVAS_WIDTH} height={canvasHeight} fill="none" stroke="rgba(0,0,0,0.15)" strokeWidth="2" />
                      <line x1={CANVAS_WIDTH / 2} y1="0" x2={CANVAS_WIDTH / 2} y2={canvasHeight} stroke="rgba(248,117,170,0.4)" strokeWidth="1" />
                      <line x1="0" y1={canvasHeight / 2} x2={CANVAS_WIDTH} y2={canvasHeight / 2} stroke="rgba(248,117,170,0.4)" strokeWidth="1" />
                    </g>
                  )}

                  {/* 대화창 UI - 화살표와 닫기 아이콘 복구됨 */}
                  <g transform={`translate(0, ${canvasHeight})`} pointerEvents="none">
                    <rect x="0" y="0" width="600" height="130" fill="#111111" rx="4" />
                    
                    <text x="20" y="42" fill="white" fontSize="20" fontWeight="bold" className="canvas-text">캐릭터 이름</text>
                    <text x="20" y="80" fill="#f3f4f6" fontSize="16" className="canvas-text">"대화창의 왼쪽/윗면이 스탠딩 영역에 완벽히 정렬됩니다."</text>
                    
                    {/* 크기와 비율이 비슷하게 조절된 우측 닫기 및 플레이 아이콘 */}
                    <polygon points="545,30 557,36 545,42" fill="white" />
                    <path d="M570,30 L582,42 M582,30 L570,42" stroke="white" strokeWidth="2.5" strokeLinecap="round" />
                  </g>
                </svg>
              ) : (
                <div className="flex flex-col items-center justify-center text-center p-6 bg-white/60 rounded-xl border-2 border-dashed border-[#F875AA] m-8">
                  <Icon path="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" className="w-10 h-10 text-deep-pink mb-2 opacity-50" />
                  <h3 className="text-sm font-bold text-ink mb-1">업로드된 이미지가 없습니다</h3>
                  <p className="text-[10px] text-gray-500">좌측 메뉴에서 이미지를 추가해주세요.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const ImageItem = ({ fileItem, scale, position, isSelected, onSelect, onRemove, onDownload, registerGetBlob, outlineThickness, outlineColor, canvasHeight }) => {
      const [imgDetails, setImgDetails] = useState(null);

      useEffect(() => {
        const img = new Image();
        img.onload = () => setImgDetails({ src: fileItem.preview, width: img.width, height: img.height, imgObj: img });
        img.src = fileItem.preview;
      }, [fileItem]);

      const getBlob = useCallback(() => {
        return new Promise((resolve) => {
          if (!imgDetails || !imgDetails.imgObj) return resolve(null);
          const canvas = document.createElement('canvas');
          canvas.width = CANVAS_WIDTH;
          canvas.height = canvasHeight; 
          const ctx = canvas.getContext('2d');
          
          const drawImgWidth = imgDetails.width * scale;
          const drawImgHeight = imgDetails.height * scale;

          if (outlineThickness > 0) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = CANVAS_WIDTH;
            tempCanvas.height = canvasHeight;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.drawImage(imgDetails.imgObj, position.x, position.y, drawImgWidth, drawImgHeight);
            tempCtx.globalCompositeOperation = "source-in";
            tempCtx.fillStyle = outlineColor;
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            
            const steps = Math.max(16, Math.ceil(outlineThickness * 2.5));
            for (let i = 0; i < steps; i++) {
              const angle = (i / steps) * Math.PI * 2;
              const dx = Math.cos(angle) * outlineThickness;
              const dy = Math.sin(angle) * outlineThickness;
              ctx.drawImage(tempCanvas, dx, dy);
            }
          }

          ctx.drawImage(imgDetails.imgObj, position.x, position.y, drawImgWidth, drawImgHeight);
          canvas.toBlob((blob) => resolve({ blob, name: fileItem.file.name }), 'image/png');
        });
      }, [imgDetails, position, scale, fileItem.file.name, outlineThickness, outlineColor, canvasHeight]);

      useEffect(() => {
        registerGetBlob(fileItem.id, getBlob);
      }, [getBlob, fileItem.id, registerGetBlob]);

      const filterId = `outline-filter-list-${fileItem.id}`;

      return (
        <div 
          onClick={onSelect}
          className={`flex flex-col border-2 rounded-xl overflow-hidden bg-white transition-all group cursor-pointer ${
            isSelected ? 'border-deep-pink shadow-md ring-1 ring-deep-pink/30' : 'border-white shadow-sm hover:border-soft-pink'
          }`}
        >
          <div className="flex justify-center items-center p-1.5 relative bg-soft-pink">
            <div className="absolute inset-0 bg-ink/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-1.5 z-10 backdrop-blur-[1px]">
              <button onClick={(e) => { e.stopPropagation(); getBlob().then(res => onDownload(res)); }} className="p-1.5 bg-white text-ink rounded hover:scale-110 shadow-sm border border-gray-200" title="개별 저장">
                <Icon path="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" className="w-3.5 h-3.5"/>
              </button>
              <button onClick={(e) => { e.stopPropagation(); onRemove(fileItem.id); }} className="p-1.5 bg-white text-deep-pink hover:bg-deep-pink hover:text-white rounded hover:scale-110 shadow-sm transition-colors border border-gray-200" title="삭제">
                <Icon path="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" className="w-3.5 h-3.5"/>
              </button>
            </div>

            <div className={`w-full relative overflow-hidden rounded border shadow-inner ${isSelected ? 'border-deep-pink' : 'border-white'}`} style={{ backgroundColor: '#AEDEFC' }}>
              <svg viewBox={`0 0 ${CANVAS_WIDTH} ${canvasHeight}`} className="w-full h-auto block">
                <defs>
                  <RoundedOutlineFilter id={filterId} thickness={outlineThickness} color={outlineColor} />
                </defs>
                {imgDetails && (
                  <image 
                    href={imgDetails.src} 
                    x={position.x} 
                    y={position.y} 
                    width={imgDetails.width * scale} 
                    height={imgDetails.height * scale} 
                    filter={outlineThickness > 0 ? `url(#${filterId})` : "none"}
                  />
                )}
              </svg>
            </div>
          </div>
          <div className={`p-1.5 bg-ivory border-t ${isSelected ? 'border-deep-pink' : 'border-gray-200'} z-20`}>
            <span className={`block text-[9px] text-center font-bold truncate ${isSelected ? 'text-deep-pink' : 'text-gray-500'}`} title={fileItem.file.name}>
              {fileItem.file.name}
            </span>
          </div>
        </div>
      );
    };

    function App() {
      const isZipLoaded = useJSZip();
      const [files, setFiles] = useState([]);
      const [selectedFileId, setSelectedFileId] = useState(null); 
      const [isProcessingBg, setIsProcessingBg] = useState(false);
      const [isDownloading, setIsDownloading] = useState(false);
      
      const [globalScale, setGlobalScale] = useState(1);
      const [globalPosition, setGlobalPosition] = useState({ x: 0, y: 0 });
      const [canvasHeight, setCanvasHeight] = useState(360); 
      const [isInitialized, setIsInitialized] = useState(false);
      
      const [outlineThickness, setOutlineThickness] = useState(0);
      const [outlineColor, setOutlineColor] = useState('#ffffff');
      
      const [refFiles, setRefFiles] = useState([]);
      const refInputRef = useRef(null);

      const fileInputRef = useRef(null);
      const getBlobFns = useRef({});

      const registerGetBlob = useCallback((id, fn) => {
        getBlobFns.current[id] = fn;
      }, []);

      useEffect(() => {
        if (files.length > 0) {
          if (!selectedFileId || !files.some(f => f.id === selectedFileId)) {
            setSelectedFileId(files[0].id);
          }
        } else {
          setSelectedFileId(null);
        }
      }, [files, selectedFileId]);

      const selectedFileItem = files.find(f => f.id === selectedFileId) || (files.length > 0 ? files[0] : null);

      const handleCanvasHeightChange = useCallback((e) => {
        const newHeight = parseInt(e.target.value);
        setGlobalPosition(prevPos => ({
          ...prevPos,
          y: prevPos.y + (newHeight - canvasHeight) 
        }));
        setCanvasHeight(newHeight);
      }, [canvasHeight]);

      const handleGlobalScaleUpdate = useCallback((newScale) => {
        setGlobalScale(prevScale => {
          const ratio = newScale / prevScale;
          setGlobalPosition(prevPos => ({
            x: (CANVAS_WIDTH / 2) - ((CANVAS_WIDTH / 2) - prevPos.x) * ratio,
            y: (canvasHeight / 2) - ((canvasHeight / 2) - prevPos.y) * ratio
          }));
          return newScale;
        });
      }, [canvasHeight]);

      const handleRemoveWhiteBackground = async () => {
        if (files.length === 0) return;
        setIsProcessingBg(true);

        const processImage = (fileItem) => {
          return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              canvas.width = img.width;
              canvas.height = img.height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0);
              
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const data = imageData.data;
              const w = canvas.width;
              const h = canvas.height;
              
              const isWhite = (i) => {
                const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                if (a === 0) return false;
                const threshold = 235; 
                return r > threshold && g > threshold && b > threshold &&
                       Math.abs(r - g) < 15 && Math.abs(r - b) < 15 && Math.abs(g - b) < 15;
              };

              const visited = new Uint8Array(w * h);
              const queueX = new Int32Array(w * h);
              const queueY = new Int32Array(w * h);
              let head = 0; let tail = 0;

              const tryAdd = (x, y) => {
                if (x < 0 || x >= w || y < 0 || y >= h) return;
                const idx = y * w + x;
                if (visited[idx]) return;

                const pxIdx = idx * 4;
                if (isWhite(pxIdx)) {
                  visited[idx] = 1;
                  data[pxIdx + 3] = 0; 
                  queueX[tail] = x;
                  queueY[tail] = y;
                  tail++;
                }
              };

              for (let x = 0; x < w; x++) { tryAdd(x, 0); tryAdd(x, h - 1); }
              for (let y = 0; y < h; y++) { tryAdd(0, y); tryAdd(w - 1, y); }

              while (head < tail) {
                const x = queueX[head]; const y = queueY[head]; head++;
                tryAdd(x + 1, y); tryAdd(x - 1, y); tryAdd(x, y + 1); tryAdd(x, y - 1);
              }
              
              ctx.putImageData(imageData, 0, 0);
              
              canvas.toBlob((blob) => {
                const newUrl = URL.createObjectURL(blob);
                resolve({
                  ...fileItem,
                  file: new File([blob], fileItem.file.name.replace(/\.[^/.]+$/, "") + ".png", { type: 'image/png' }),
                  preview: newUrl
                });
              }, 'image/png');
            };
            img.src = fileItem.preview;
          });
        };

        try {
          const newFiles = await Promise.all(files.map(processImage));
          setFiles(newFiles);
        } catch (e) {
          console.error("배경 제거 중 오류 발생:", e);
        } finally {
          setIsProcessingBg(false);
        }
      };

      const handleGlobalAutoTrim = useCallback(() => {
        if (!selectedFileItem) return;
        const targetFile = selectedFileItem;
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const l = pixels.data.length;
          let bound = { top: null, left: null, right: null, bottom: null };

          for (let i = 0; i < l; i += 4) {
            if (pixels.data[i + 3] !== 0) {
              const x = (i / 4) % canvas.width;
              const y = ~~((i / 4) / canvas.width);
              if (bound.top === null) bound.top = y;
              if (bound.left === null || x < bound.left) bound.left = x;
              if (bound.right === null || x > bound.right) bound.right = x;
              if (bound.bottom === null || y > bound.bottom) bound.bottom = y;
            }
          }

          if (bound.top !== null) {
            const trimWidth = bound.right - bound.left + 1;
            const trimHeight = bound.bottom - bound.top + 1;
            const newScale = CANVAS_WIDTH / trimWidth;
            
            setCanvasHeight(Math.ceil(trimHeight * newScale));
            setGlobalScale(newScale);
            setGlobalPosition({
              x: -bound.left * newScale,
              y: -bound.top * newScale
            });
          }
        };
        img.src = targetFile.preview;
      }, [selectedFileItem]);

      const handleGlobalFitBottom = useCallback(() => {
        if (!selectedFileItem) return;
        const img = new Image();
        img.onload = () => {
          const newScale = CANVAS_WIDTH / img.width;
          setCanvasHeight(Math.ceil(img.height * newScale));
          setGlobalScale(newScale);
          setGlobalPosition({ x: 0, y: 0 });
        };
        img.src = selectedFileItem.preview;
      }, [selectedFileItem]);

      useEffect(() => {
        if (files.length > 0 && !isInitialized) {
          setIsInitialized(true);
          handleGlobalFitBottom();
        }
      }, [files, isInitialized, handleGlobalFitBottom]);

      const handleFileChange = (e) => {
        const selectedFiles = Array.from(e.target.files);
        if (selectedFiles.length === 0) return;
        
        const newFiles = selectedFiles.map(file => ({
          id: Math.random().toString(36).substring(7),
          file,
          preview: URL.createObjectURL(file)
        }));
        
        setFiles(prev => {
          const updatedFiles = [...prev, ...newFiles];
          if (!selectedFileId && updatedFiles.length > 0) {
            setSelectedFileId(updatedFiles[0].id);
          }
          return updatedFiles;
        });
        
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const removeFile = (id) => {
        setFiles(prev => prev.filter(f => f.id !== id));
        delete getBlobFns.current[id];
        if (files.length <= 1) setIsInitialized(false);
      };

      const handleRefFileChange = (e) => {
        const selectedFiles = Array.from(e.target.files).slice(0, 3 - refFiles.length);
        if (selectedFiles.length === 0) return;

        selectedFiles.forEach((file) => {
          const preview = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            const scale = CANVAS_WIDTH / img.width;
            const posX = (CANVAS_WIDTH - img.width * scale) / 2;
            
            setRefFiles(prev => {
              let defaultOffsetX = 250; 
              if (prev.length === 1) defaultOffsetX = -250;
              if (prev.length === 2) defaultOffsetX = 500;

              return [...prev, {
                id: Math.random().toString(36).substring(7),
                file, preview, width: img.width, height: img.height,
                scale, posX, opacity: 0.6, offsetX: defaultOffsetX
              }];
            });
          };
          img.src = preview;
        });
        if (refInputRef.current) refInputRef.current.value = '';
      };

      const updateRef = (id, key, value) => setRefFiles(prev => prev.map(r => r.id === id ? { ...r, [key]: value } : r));
      const removeRef = (id) => setRefFiles(prev => prev.filter(r => r.id !== id));

      const downloadSingle = (res) => {
        if (!res || !res.blob) return;
        const url = URL.createObjectURL(res.blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `cropped_${res.name}`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const downloadAll = async () => {
        if (!isZipLoaded || files.length === 0) return;
        setIsDownloading(true); 
        const zip = new window.JSZip();
        
        const promises = files.map(fileItem => {
          const fn = getBlobFns.current[fileItem.id];
          return fn ? fn() : null;
        });

        try {
          const results = await Promise.all(promises);
          let hasValidImage = false;
          results.forEach((res) => {
            if (res && res.blob) {
              hasValidImage = true;
              zip.file(`cropped_${res.name}`, res.blob);
            }
          });

          if (hasValidImage) {
            const content = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Crop_Standing.zip';
            a.click();
            URL.revokeObjectURL(url);
          }
        } catch (e) {
          console.error("ZIP 생성 오류:", e);
        } finally {
          setIsDownloading(false); 
        }
      };

      return (
        <div className="flex flex-col md:flex-row h-screen w-full overflow-hidden text-ink">
          
          <div className="md:py-6 md:pl-6 w-full md:w-[320px] h-auto md:h-full flex-shrink-0 relative z-10 overflow-visible">
            <aside className="w-full retro-window flex flex-col h-[50vh] md:h-full overflow-hidden">
              
              <div className="retro-header flex justify-between items-center flex-shrink-0 border-b-2 border-deep-pink">
                <span className="flex items-center gap-1.5"><Icon path="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6z" className="w-3.5 h-3.5"/> CCFolia_Cropper.exe</span>
                <div className="w-4 h-4 bg-soft-pink border border-white text-deep-pink flex items-center justify-center cursor-pointer hover:bg-white leading-none">✕</div>
              </div>

              <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-5 custom-scrollbar bg-ivory">
                
                <div className="space-y-2">
                  <h3 className="text-[10px] font-bold text-deep-pink uppercase tracking-widest bg-soft-pink inline-block px-1.5 py-0.5 border border-pink-200">1. 파일 업로드</h3>
                  <button 
                    onClick={() => fileInputRef.current?.click()}
                    className="retro-btn w-full flex items-center justify-center gap-1.5 bg-sky text-ink py-2 transition-all font-bold text-xs"
                  >
                    <Icon path="M12 4v16m8-8H4" className="w-3.5 h-3.5" /> 이미지 추가하기
                  </button>
                  <input ref={fileInputRef} type="file" multiple accept="image/png, image/jpeg, image/webp" onChange={handleFileChange} className="hidden" />
                  
                  <button 
                    onClick={handleRemoveWhiteBackground}
                    disabled={files.length === 0 || isProcessingBg}
                    className={`retro-btn w-full flex items-center justify-center gap-1.5 py-2 text-xs font-bold transition-all ${
                      files.length > 0 && !isProcessingBg
                        ? 'bg-mint text-ink' 
                        : 'bg-gray-200 text-gray-400 cursor-not-allowed border-gray-300'
                    }`}
                  >
                    {isProcessingBg ? "⏳ 지우는 중..." : <><Icon path="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" className="w-3.5 h-3.5" /> 흰색 배경 지우기</>}
                  </button>
                </div>

                <div className={`space-y-2 ${files.length === 0 ? 'opacity-30 pointer-events-none' : ''}`}>
                  <h3 className="text-[10px] font-bold text-deep-pink uppercase tracking-widest bg-soft-pink inline-block px-1.5 py-0.5 border border-pink-200">2. 둥근 테두리</h3>
                  <div className="bg-white border-2 border-gray-200 p-2.5 space-y-3 shadow-inner">
                    <div className="flex justify-between items-center text-[11px] font-bold text-ink">
                      <span>두께</span>
                      <span className="bg-gray-100 border border-gray-300 px-1.5 py-0.5 text-center w-8 shadow-inner">{outlineThickness}px</span>
                    </div>
                    <input 
                      type="range" min="0" max="30" step="1" 
                      value={outlineThickness} onChange={(e) => setOutlineThickness(parseInt(e.target.value))}
                      className="w-full h-2 bg-gray-200 border border-gray-300 appearance-none cursor-pointer accent-deep-pink"
                    />
                    <div className="flex justify-between items-center text-[11px] font-bold text-ink pt-1 border-t border-dashed border-gray-300">
                      <span className="mt-1">색상</span>
                      <label className="flex items-center gap-1.5 cursor-pointer mt-1">
                        <span className="text-[9px] text-gray-500 font-mono bg-gray-100 px-1 shadow-inner">{outlineColor.toUpperCase()}</span>
                        <div className="relative w-5 h-5 border-2 border-white shadow-sm overflow-hidden" style={{ backgroundColor: outlineColor }}>
                          <input type="color" value={outlineColor} onChange={e => setOutlineColor(e.target.value)} className="absolute opacity-0 w-8 h-8 -top-1 -left-1 cursor-pointer" />
                        </div>
                      </label>
                    </div>
                  </div>
                </div>

                <div className={`space-y-2 ${files.length === 0 ? 'opacity-30 pointer-events-none' : ''}`}>
                  <h3 className="text-[10px] font-bold text-deep-pink uppercase tracking-widest bg-soft-pink inline-block px-1.5 py-0.5 border border-pink-200">3. 위치 및 조절</h3>
                  
                  <button 
                    onClick={handleGlobalAutoTrim}
                    className="retro-btn w-full flex items-center justify-center gap-1.5 bg-deep-pink text-white py-2 transition-all text-xs font-bold"
                  >
                    <Icon path="M13 10V3L4 14h7v7l9-11h-7z" className="w-3.5 h-3.5" /> 일괄 투명 여백 제거
                  </button>
                  <button 
                    onClick={handleGlobalFitBottom}
                    className="retro-btn w-full flex items-center justify-center gap-1.5 bg-white text-ink py-1.5 transition-all text-xs font-bold"
                  >
                    <Icon path="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" className="w-3.5 h-3.5"/> 하단 초기화
                  </button>

                  <div className="pt-2 space-y-3 bg-white border-2 border-gray-200 shadow-inner p-2.5">
                    <div>
                      <div className="flex justify-between items-center text-[11px] font-bold text-ink mb-1.5">
                        <span>세로 높이</span>
                        <span className="bg-gray-100 border border-gray-300 px-1.5 py-0.5 text-center w-10 shadow-inner">{canvasHeight}px</span>
                      </div>
                      <input 
                        type="range" min="100" max="1500" step="10" 
                        value={canvasHeight} onChange={handleCanvasHeightChange}
                        className="w-full h-2 bg-gray-200 border border-gray-300 appearance-none cursor-pointer accent-deep-pink"
                      />
                    </div>
                    <div className="pt-1 border-t border-dashed border-gray-300">
                      <div className="flex justify-between items-center text-[11px] font-bold text-ink mb-1.5 mt-1">
                        <span>크기 확대</span>
                        <div className="flex items-center gap-1.5">
                          <button onClick={() => handleGlobalScaleUpdate(1)} className="retro-btn text-[9px] bg-white px-1.5 py-0.5 active:translate-y-0 text-gray-500">100%</button>
                          <span className="bg-gray-100 border border-gray-300 px-1.5 py-0.5 text-center w-8 shadow-inner">{(globalScale * 100).toFixed(0)}%</span>
                        </div>
                      </div>
                      <input 
                        type="range" min="0.1" max="3" step="0.01" 
                        value={globalScale} onChange={(e) => handleGlobalScaleUpdate(parseFloat(e.target.value))}
                        className="w-full h-2 bg-gray-200 border border-gray-300 appearance-none cursor-pointer accent-deep-pink"
                      />
                    </div>
                  </div>
                </div>

                <div className="space-y-2 pb-1">
                  <div className="flex justify-between items-center">
                    <h3 className="text-[10px] font-bold text-deep-pink uppercase tracking-widest bg-soft-pink inline-block px-1.5 py-0.5 border border-pink-200">4. 스탠딩 비교</h3>
                    <span className="text-[9px] font-bold text-white bg-deep-pink px-1.5 py-0.5 border border-white shadow-[1px_1px_0_rgba(0,0,0,0.1)]">{refFiles.length}/3</span>
                  </div>
                  
                  {refFiles.length < 3 && (
                    <button 
                      onClick={() => refInputRef.current?.click()}
                      className="retro-btn w-full flex items-center justify-center gap-1.5 bg-sky text-ink py-2 transition-all font-bold text-xs"
                    >
                      <Icon path="M12 4v16m8-8H4" className="w-3.5 h-3.5" /> 비교 스탠딩 열기
                    </button>
                  )}
                  <input ref={refInputRef} type="file" multiple accept="image/png, image/jpeg, image/webp" onChange={handleRefFileChange} className="hidden" />

                  <div className="space-y-2">
                    {refFiles.map((ref, idx) => (
                      <div key={ref.id} className="p-2.5 bg-white border-2 border-gray-200 space-y-2 relative group shadow-sm">
                        <button onClick={() => removeRef(ref.id)} className="retro-btn absolute top-1.5 right-1.5 p-0.5 bg-soft-pink text-deep-pink leading-none w-5 h-5 flex items-center justify-center font-bold" title="삭제">✕</button>
                        
                        <div className="flex items-center gap-1.5 pr-6 border-b border-dashed border-gray-200 pb-1.5">
                          <span className="flex items-center justify-center w-4 h-4 bg-sky text-ink border border-white shadow-[1px_1px_0_rgba(0,0,0,0.1)] font-bold text-[9px]">{idx + 1}</span>
                          <span className="text-[10px] font-bold text-ink truncate block">{ref.file.name}</span>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-3 pt-0.5">
                          <div className="space-y-1">
                            <div className="flex justify-between text-[9px] font-bold text-gray-500">
                              <span>투명도</span><span className="bg-gray-100 border border-gray-200 px-1 shadow-inner">{Math.round(ref.opacity * 100)}%</span>
                            </div>
                            <input type="range" min="0" max="1" step="0.05" value={ref.opacity} onChange={(e) => updateRef(ref.id, 'opacity', parseFloat(e.target.value))} className="w-full h-1.5 bg-gray-200 border border-gray-300 appearance-none cursor-pointer accent-sky" />
                          </div>
                          <div className="space-y-1">
                            <div className="flex justify-between text-[9px] font-bold text-gray-500">
                              <span>좌우</span><span className="bg-gray-100 border border-gray-200 px-1 shadow-inner">{ref.offsetX}px</span>
                            </div>
                            <input type="range" min="-500" max="500" step="5" value={ref.offsetX} onChange={(e) => updateRef(ref.id, 'offsetX', parseInt(e.target.value))} className="w-full h-1.5 bg-gray-200 border border-gray-300 appearance-none cursor-pointer accent-sky" />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

              </div>

              <div className="p-3 border-t-2 border-white bg-soft-pink flex-shrink-0">
                <button 
                  onClick={downloadAll}
                  disabled={!isZipLoaded || files.length === 0 || isDownloading}
                  className={`retro-btn w-full py-3 font-bold flex items-center justify-center gap-1.5 transition-all text-xs ${
                    files.length > 0 && isZipLoaded && !isDownloading
                      ? 'bg-deep-pink text-white' 
                      : 'bg-gray-200 text-gray-400 cursor-not-allowed border-gray-300'
                  }`}
                >
                  {isDownloading ? "⏳ 압축 중..." : <><Icon path="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" className="w-4 h-4"/> {files.length > 0 ? `ZIP 일괄 저장 (${files.length}장)` : '이미지를 추가해주세요'}</>}
                </button>
              </div>
            </aside>
          </div>

          <main className="flex-1 h-full overflow-y-auto p-4 lg:p-6 flex flex-col gap-6 relative">
            <GamePreview 
              fileItem={selectedFileItem} 
              scale={globalScale} 
              position={globalPosition} 
              onPositionChange={setGlobalPosition}
              onScaleChange={handleGlobalScaleUpdate} 
              outlineThickness={outlineThickness}
              outlineColor={outlineColor}
              refFiles={refFiles}
              canvasHeight={canvasHeight}
            />

            {files.length > 0 && (
              <div className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border-2 border-white shadow-[4px_4px_0_rgba(0,0,0,0.05)] mb-8">
                <h2 className="text-sm font-bold text-ink mb-4 flex items-center gap-1.5 border-b-2 border-soft-pink pb-2">
                  <span className="bg-deep-pink text-white px-2 py-0.5 border border-white shadow-[1px_1px_0_rgba(0,0,0,0.1)]">출력 대기열</span>
                  <span className="text-gray-500 text-xs ml-1">총 {files.length}개</span>
                </h2>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4">
                  {files.map(fileItem => (
                    <ImageItem 
                      key={fileItem.id} 
                      fileItem={fileItem}
                      scale={globalScale}
                      position={globalPosition}
                      isSelected={selectedFileId === fileItem.id}
                      onSelect={() => setSelectedFileId(fileItem.id)}
                      onRemove={removeFile}
                      onDownload={downloadSingle}
                      registerGetBlob={registerGetBlob}
                      outlineThickness={outlineThickness}
                      outlineColor={outlineColor}
                      canvasHeight={canvasHeight}
                    />
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
