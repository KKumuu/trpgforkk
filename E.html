<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CCFolia 스탠딩 크롭기</title>

  <!-- 파비콘 적용 -->
  <link rel="icon" type="image/png" href="./favicon.png">

  <!-- 디자인 및 필수 기능(React, Tailwind) 불러오기 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 폰트 적용 (갈무리9) */
    @font-face {
        font-family: 'Galmuri9';
        src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/Galmuri9.woff') format('woff');
        font-weight: normal;
        font-style: normal;
    }
    
    body {
        font-family: 'Galmuri9', sans-serif;
    }

    /* 메인 캔버스 내부 텍스트 폰트 보호용 */
    .canvas-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* 스크롤바 예쁘게 커스텀 */
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  </style>
</head>
<body class="bg-[#eef0f2]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const useJSZip = () => {
      const [isLoaded, setIsLoaded] = useState(false);
      useEffect(() => {
        if (window.JSZip) {
          setIsLoaded(true);
          return;
        }
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        script.onload = () => setIsLoaded(true);
        document.head.appendChild(script);
      }, []);
      return isLoaded;
    };

    const Icon = ({ path, title, className = "w-5 h-5" }) => (
      <svg className={`${className} inline-block`} fill="none" stroke="currentColor" viewBox="0 0 24 24" title={title}>
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={path} />
      </svg>
    );

    const OUTPUT_WIDTH = 480;
    const OUTPUT_HEIGHT = 720;

    const RoundedOutlineFilter = ({ id, thickness, color }) => {
      if (thickness <= 0) return null;
      const blurStdDev = thickness * 0.45; 
      
      return (
        <filter id={id} x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceAlpha" stdDeviation={blurStdDev} result="blur" />
          <feComponentTransfer in="blur" result="thickened">
            <feFuncA type="linear" slope="50" intercept="-1.5" />
          </feComponentTransfer>
          <feFlood floodColor={color} result="color" />
          <feComposite in="color" in2="thickened" operator="in" result="outline" />
          <feMerge>
            <feMergeNode in="outline" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      );
    };

    const GamePreview = ({ fileItem, scale, position, onPositionChange, onScaleChange, outlineThickness, outlineColor, refFiles }) => {
      const [imgDetails, setImgDetails] = useState(null);
      const [isDragging, setIsDragging] = useState(false);
      const [lastMousePos, setLastMousePos] = useState({ x: 0, y: 0 });
      const [showGrid, setShowGrid] = useState(false);
      const [bgColor, setBgColor] = useState('#e5e7eb'); 
      
      const PRESET_COLORS = ['#e5e7eb', '#ffffff', '#1f2937', '#10b981', '#3b82f6']; 
      const svgRef = useRef(null);

      useEffect(() => {
        if (!fileItem) {
          setImgDetails(null);
          return;
        }
        const img = new Image();
        img.onload = () => {
          setImgDetails({ src: fileItem.preview, width: img.width, height: img.height });
        };
        img.src = fileItem.preview;
      }, [fileItem]);

      useEffect(() => {
        const container = svgRef.current;
        if (!container) return;

        const handleNativeWheel = (e) => {
          if (!fileItem) return;
          e.preventDefault(); 
          const scaleAdjust = e.deltaY > 0 ? 0.95 : 1.05;
          onScaleChange(Math.max(0.1, scale * scaleAdjust));
        };

        container.addEventListener('wheel', handleNativeWheel, { passive: false });
        return () => {
          container.removeEventListener('wheel', handleNativeWheel);
        };
      }, [fileItem, scale, onScaleChange]);

      const handleMouseDown = (e) => {
        if (!fileItem) return;
        setIsDragging(true);
        setLastMousePos({ x: e.clientX, y: e.clientY });
      };

      const handleMouseMove = (e) => {
        if (!isDragging || !fileItem) return;
        const ratio = svgRef.current ? svgRef.current.clientWidth / 1000 : 1;
        const dx = (e.clientX - lastMousePos.x) / ratio;
        const dy = (e.clientY - lastMousePos.y) / ratio;

        onPositionChange(prev => ({ x: prev.x + dx, y: prev.y + dy }));
        setLastMousePos({ x: e.clientX, y: e.clientY });
      };

      const handleMouseUp = () => setIsDragging(false);

      const handleKeyDown = (e) => {
        if (!fileItem) return;
        const step = e.shiftKey ? 10 : 1;
        switch (e.key) {
          case 'ArrowUp': onPositionChange(p => ({ ...p, y: p.y - step })); e.preventDefault(); break;
          case 'ArrowDown': onPositionChange(p => ({ ...p, y: p.y + step })); e.preventDefault(); break;
          case 'ArrowLeft': onPositionChange(p => ({ ...p, x: p.x - step })); e.preventDefault(); break;
          case 'ArrowRight': onPositionChange(p => ({ ...p, x: p.x + step })); e.preventDefault(); break;
          default: break;
        }
      };

      return (
        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col">
          <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-3 mb-3">
            <h2 className="text-lg font-bold text-gray-900 flex items-center gap-1.5">
              <Icon path="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" className="w-5 h-5 text-black" />
              메인 캔버스
            </h2>
            
            <div className="flex flex-wrap items-center gap-2 w-full xl:w-auto">
              <div className="flex items-center gap-2 bg-gray-50 px-2.5 py-1 rounded-lg border border-gray-200 w-full sm:w-auto">
                <span className="text-[11px] font-bold text-gray-500 whitespace-nowrap">배경:</span>
                <div className="flex items-center gap-1.5">
                  {PRESET_COLORS.map(c => (
                    <button 
                      key={c} 
                      onClick={() => setBgColor(c)} 
                      className={`w-4 h-4 rounded-full border border-gray-300 transition-all ${bgColor === c ? 'ring-2 ring-black ring-offset-1 scale-110' : 'hover:scale-110'}`} 
                      style={{ backgroundColor: c }} 
                      title="배경색 변경" 
                    />
                  ))}
                  <div className="w-[1px] h-3 bg-gray-300 mx-0.5"></div>
                  <label className="relative w-4 h-4 rounded-full border border-gray-300 hover:scale-110 transition-transform overflow-hidden cursor-pointer shadow-sm" title="직접 색상 선택">
                    <div className="absolute inset-0 pointer-events-none" style={{ background: 'conic-gradient(#f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00)' }}></div>
                    <input type="color" value={bgColor} onChange={e => setBgColor(e.target.value)} className="absolute opacity-0 w-6 h-6 -top-1 -left-1 cursor-pointer" />
                  </label>
                </div>
              </div>

              <label className="flex items-center gap-1.5 text-xs font-medium text-gray-700 cursor-pointer hover:text-black transition-colors whitespace-nowrap border border-gray-200 bg-gray-50 px-2 py-1 rounded-lg">
                <input type="checkbox" checked={showGrid} onChange={(e) => setShowGrid(e.target.checked)} className="w-3.5 h-3.5 rounded border-gray-300 text-black focus:ring-black accent-black" />
                안내선
              </label>

              {/* 추가된 설명란 */}
              {fileItem && (
                <span className="text-[10px] text-gray-600 bg-gray-50 px-2.5 py-1.5 rounded-lg border border-gray-200 hidden md:inline-block">
                  💡 <b>드래그 / 휠 / 방향키</b>로 위치 및 크기 조절
                </span>
              )}
            </div>
          </div>

          <div className="w-full flex-1 flex justify-center items-center rounded-xl overflow-hidden border border-gray-200 shadow-inner transition-colors duration-300" style={{ backgroundColor: bgColor, minHeight: '400px' }}>
            <div className="w-full max-w-3xl relative h-full flex justify-center items-center">
              {fileItem || refFiles.length > 0 ? (
                <svg 
                  ref={svgRef}
                  viewBox="0 0 1000 920" 
                  className={`w-full h-auto block touch-none outline-none overflow-visible ${fileItem ? 'cursor-move focus:ring-2 focus:ring-black/20 focus:ring-inset' : 'cursor-default'}`} 
                  tabIndex={0}
                  onMouseDown={handleMouseDown}
                  onMouseMove={handleMouseMove}
                  onMouseUp={handleMouseUp}
                  onMouseLeave={handleMouseUp}
                  onKeyDown={handleKeyDown}
                >
                  <defs>
                    <clipPath id="stand-clip">
                      <rect width={OUTPUT_WIDTH} height={OUTPUT_HEIGHT} />
                    </clipPath>
                    <RoundedOutlineFilter id="main-outline-filter" thickness={outlineThickness} color={outlineColor} />
                  </defs>

                  <rect width="1000" height="920" fill={bgColor} />
                  <rect width={OUTPUT_WIDTH} height={OUTPUT_HEIGHT} fill={bgColor} stroke={bgColor === '#ffffff' ? '#e5e7eb' : '#ffffff'} strokeOpacity="0.3" strokeWidth="2" />

                  {/* 1. 메인 편집 이미지 렌더링 */}
                  {imgDetails && (
                    <g clipPath="url(#stand-clip)">
                      <image 
                        href={imgDetails.src} 
                        x={position.x} 
                        y={position.y} 
                        width={imgDetails.width * scale} 
                        height={imgDetails.height * scale} 
                        filter={outlineThickness > 0 ? "url(#main-outline-filter)" : "none"}
                      />
                    </g>
                  )}

                  {/* 2. 비교용 스탠딩 렌더링 (가로/세로 480x720 안에 완벽히 리사이징됨) */}
                  {refFiles.map((ref) => (
                    <g key={ref.id} transform={`translate(${ref.offsetX}, 0)`} opacity={ref.opacity} pointerEvents="none">
                      {/* 비교용 이미지도 깔끔하게 보이기 위해 메인 박스 크기 안에서 클리핑 */}
                      <g clipPath="url(#stand-clip)">
                        <image 
                          href={ref.preview} 
                          x={ref.posX} 
                          y={ref.posY} 
                          width={ref.width * ref.scale} 
                          height={ref.height * ref.scale} 
                        />
                      </g>
                    </g>
                  ))}

                  {/* 안내선 Grid */}
                  {showGrid && (
                    <g pointerEvents="none">
                      <rect width={OUTPUT_WIDTH} height={OUTPUT_HEIGHT} fill="none" stroke="rgba(0,0,0,0.2)" strokeWidth="2" />
                      <line x1={OUTPUT_WIDTH / 3} y1="0" x2={OUTPUT_WIDTH / 3} y2={OUTPUT_HEIGHT} stroke="rgba(0,0,0,0.15)" strokeWidth="1" strokeDasharray="4 4" />
                      <line x1={(OUTPUT_WIDTH / 3) * 2} y1="0" x2={(OUTPUT_WIDTH / 3) * 2} y2={OUTPUT_HEIGHT} stroke="rgba(0,0,0,0.15)" strokeWidth="1" strokeDasharray="4 4" />
                      <line x1="0" y1={OUTPUT_HEIGHT / 3} x2={OUTPUT_WIDTH} y2={OUTPUT_HEIGHT / 3} stroke="rgba(0,0,0,0.15)" strokeWidth="1" strokeDasharray="4 4" />
                      <line x1="0" y1={(OUTPUT_HEIGHT / 3) * 2} x2={OUTPUT_WIDTH} y2={(OUTPUT_HEIGHT / 3) * 2} stroke="rgba(0,0,0,0.15)" strokeWidth="1" strokeDasharray="4 4" />
                      <line x1={OUTPUT_WIDTH / 2} y1="0" x2={OUTPUT_WIDTH / 2} y2={OUTPUT_HEIGHT} stroke="rgba(255,0,0,0.3)" strokeWidth="1" />
                      <line x1="0" y1={OUTPUT_HEIGHT / 2} x2={OUTPUT_WIDTH} y2={OUTPUT_HEIGHT / 2} stroke="rgba(255,0,0,0.3)" strokeWidth="1" />
                    </g>
                  )}

                  {/* 대화창 UI (글씨체 보호) */}
                  <g transform={`translate(0, ${OUTPUT_HEIGHT})`} pointerEvents="none">
                    <rect width="1000" height="200" fill="#151515" />
                    <text x="40" y="60" fill="white" fontSize="24" fontWeight="bold" className="canvas-text">이름은 이정도 길이</text>
                    <text x="40" y="115" fill="#f3f4f6" fontSize="20" className="canvas-text">"대사의 예시입니다."</text>
                    <polygon points="910,48 918,54 910,60" fill="white" />
                    <path d="M940 45 L955 60 M955 45 L940 60" stroke="white" strokeWidth="2.5" strokeLinecap="round" />
                  </g>
                </svg>
              ) : (
                <div className="flex flex-col items-center justify-center text-center p-8 bg-white/50 rounded-2xl border-2 border-dashed border-gray-300 m-8">
                  <div className="bg-gray-100 p-4 rounded-full mb-4">
                    <Icon path="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" className="w-8 h-8 text-gray-400" />
                  </div>
                  <h3 className="text-lg font-bold text-gray-700 mb-1">업로드된 이미지가 없습니다</h3>
                  <p className="text-xs text-gray-500 max-w-xs">왼쪽 툴바에서 이미지 파일을 추가해주세요.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- 개별 이미지 에디터 컴포넌트 ---
    const ImageItem = ({ fileItem, scale, position, isSelected, onSelect, onRemove, onDownload, registerGetBlob, outlineThickness, outlineColor }) => {
      const [imgDetails, setImgDetails] = useState(null);

      useEffect(() => {
        const img = new Image();
        img.onload = () => setImgDetails({ src: fileItem.preview, width: img.width, height: img.height, imgObj: img });
        img.src = fileItem.preview;
      }, [fileItem]);

      const getBlob = useCallback(() => {
        return new Promise((resolve) => {
          if (!imgDetails || !imgDetails.imgObj) return resolve(null);
          const canvas = document.createElement('canvas');
          canvas.width = OUTPUT_WIDTH;
          canvas.height = OUTPUT_HEIGHT;
          const ctx = canvas.getContext('2d');
          
          const drawImgWidth = imgDetails.width * scale;
          const drawImgHeight = imgDetails.height * scale;

          if (outlineThickness > 0) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = OUTPUT_WIDTH;
            tempCanvas.height = OUTPUT_HEIGHT;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.drawImage(imgDetails.imgObj, position.x, position.y, drawImgWidth, drawImgHeight);
            tempCtx.globalCompositeOperation = "source-in";
            tempCtx.fillStyle = outlineColor;
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            
            const steps = Math.max(16, Math.ceil(outlineThickness * 2.5));
            for (let i = 0; i < steps; i++) {
              const angle = (i / steps) * Math.PI * 2;
              const dx = Math.cos(angle) * outlineThickness;
              const dy = Math.sin(angle) * outlineThickness;
              ctx.drawImage(tempCanvas, dx, dy);
            }
          }

          ctx.drawImage(imgDetails.imgObj, position.x, position.y, drawImgWidth, drawImgHeight);
          canvas.toBlob((blob) => resolve({ blob, name: fileItem.file.name }), 'image/png');
        });
      }, [imgDetails, position, scale, fileItem.file.name, outlineThickness, outlineColor]);

      useEffect(() => {
        registerGetBlob(fileItem.id, getBlob);
      }, [getBlob, fileItem.id, registerGetBlob]);

      const filterId = `outline-filter-list-${fileItem.id}`;

      return (
        <div 
          onClick={onSelect}
          className={`flex flex-col border-2 rounded-xl overflow-hidden bg-white transition-all group cursor-pointer ${
            isSelected 
              ? 'border-black shadow-md scale-[1.02] ring-2 ring-black/10' 
              : 'border-transparent shadow-sm hover:shadow-md hover:border-gray-300'
          }`}
        >
          <div className="flex justify-center items-center p-1.5 relative bg-[#e5e7eb]">
            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-1.5 z-10 backdrop-blur-[1px]">
              <button 
                onClick={(e) => { e.stopPropagation(); getBlob().then(res => onDownload(res)); }} 
                className="p-1.5 bg-white text-gray-900 rounded-full hover:scale-110 shadow-sm transition-transform border border-gray-200" 
                title="개별 저장"
              >
                <Icon path="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" className="w-4 h-4"/>
              </button>
              <button 
                onClick={(e) => { e.stopPropagation(); onRemove(fileItem.id); }} 
                className="p-1.5 bg-white text-gray-600 hover:text-black rounded-full hover:scale-110 shadow-sm transition-colors border border-gray-200" 
                title="삭제"
              >
                <Icon path="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" className="w-4 h-4"/>
              </button>
            </div>

            <div className={`w-full relative overflow-hidden rounded-md border shadow-inner ${isSelected ? 'border-gray-400' : 'border-gray-300'}`} style={{ backgroundColor: '#e5e7eb' }}>
              <svg viewBox={`0 0 ${OUTPUT_WIDTH} ${OUTPUT_HEIGHT}`} className="w-full h-auto block">
                <defs>
                  <RoundedOutlineFilter id={filterId} thickness={outlineThickness} color={outlineColor} />
                </defs>
                {imgDetails && (
                  <image 
                    href={imgDetails.src} 
                    x={position.x} 
                    y={position.y} 
                    width={imgDetails.width * scale} 
                    height={imgDetails.height * scale} 
                    filter={outlineThickness > 0 ? `url(#${filterId})` : "none"}
                  />
                )}
              </svg>
            </div>
          </div>
          <div className={`p-2 bg-white border-t ${isSelected ? 'border-gray-200' : 'border-gray-100'} z-20 relative`}>
            <span className={`block text-[10px] text-center font-bold truncate ${isSelected ? 'text-black' : 'text-gray-500'}`} title={fileItem.file.name}>
              {fileItem.file.name}
            </span>
          </div>
        </div>
      );
    };

    // --- 메인 App 컴포넌트 ---
    function App() {
      const isZipLoaded = useJSZip();
      const [files, setFiles] = useState([]);
      const [selectedFileId, setSelectedFileId] = useState(null); 
      const [isProcessingBg, setIsProcessingBg] = useState(false);
      const [isDownloading, setIsDownloading] = useState(false);
      
      const [globalScale, setGlobalScale] = useState(1);
      const [globalPosition, setGlobalPosition] = useState({ x: 0, y: 0 });
      const [isInitialized, setIsInitialized] = useState(false);
      
      const [outlineThickness, setOutlineThickness] = useState(0);
      const [outlineColor, setOutlineColor] = useState('#ffffff');
      
      const [refFiles, setRefFiles] = useState([]);
      const refInputRef = useRef(null);

      const fileInputRef = useRef(null);
      const getBlobFns = useRef({});

      const registerGetBlob = useCallback((id, fn) => {
        getBlobFns.current[id] = fn;
      }, []);

      useEffect(() => {
        if (files.length > 0) {
          if (!selectedFileId || !files.some(f => f.id === selectedFileId)) {
            setSelectedFileId(files[0].id);
          }
        } else {
          setSelectedFileId(null);
        }
      }, [files, selectedFileId]);

      const selectedFileItem = files.find(f => f.id === selectedFileId) || (files.length > 0 ? files[0] : null);

      const handleGlobalScaleUpdate = useCallback((newScale) => {
        setGlobalScale(prevScale => {
          const ratio = newScale / prevScale;
          setGlobalPosition(prevPos => ({
            x: (OUTPUT_WIDTH / 2) - ((OUTPUT_WIDTH / 2) - prevPos.x) * ratio,
            y: (OUTPUT_HEIGHT / 2) - ((OUTPUT_HEIGHT / 2) - prevPos.y) * ratio
          }));
          return newScale;
        });
      }, []);

      const handleRemoveWhiteBackground = async () => {
        if (files.length === 0) return;
        setIsProcessingBg(true);

        const processImage = (fileItem) => {
          return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              canvas.width = img.width;
              canvas.height = img.height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0);
              
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const data = imageData.data;
              const w = canvas.width;
              const h = canvas.height;
              
              const isWhite = (i) => {
                const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                if (a === 0) return false;
                const threshold = 235; 
                return r > threshold && g > threshold && b > threshold &&
                       Math.abs(r - g) < 15 && Math.abs(r - b) < 15 && Math.abs(g - b) < 15;
              };

              const visited = new Uint8Array(w * h);
              const queueX = new Int32Array(w * h);
              const queueY = new Int32Array(w * h);
              let head = 0;
              let tail = 0;

              const tryAdd = (x, y) => {
                if (x < 0 || x >= w || y < 0 || y >= h) return;
                const idx = y * w + x;
                if (visited[idx]) return;

                const pxIdx = idx * 4;
                if (isWhite(pxIdx)) {
                  visited[idx] = 1;
                  data[pxIdx + 3] = 0; 
                  queueX[tail] = x;
                  queueY[tail] = y;
                  tail++;
                }
              };

              for (let x = 0; x < w; x++) { tryAdd(x, 0); tryAdd(x, h - 1); }
              for (let y = 0; y < h; y++) { tryAdd(0, y); tryAdd(w - 1, y); }

              while (head < tail) {
                const x = queueX[head];
                const y = queueY[head];
                head++;
                
                tryAdd(x + 1, y);
                tryAdd(x - 1, y);
                tryAdd(x, y + 1);
                tryAdd(x, y - 1);
              }
              
              ctx.putImageData(imageData, 0, 0);
              
              canvas.toBlob((blob) => {
                const newUrl = URL.createObjectURL(blob);
                resolve({
                  ...fileItem,
                  file: new File([blob], fileItem.file.name.replace(/\.[^/.]+$/, "") + ".png", { type: 'image/png' }),
                  preview: newUrl
                });
              }, 'image/png');
            };
            img.src = fileItem.preview;
          });
        };

        try {
          const newFiles = await Promise.all(files.map(processImage));
          setFiles(newFiles);
        } catch (e) {
          console.error("배경 제거 중 오류 발생:", e);
        } finally {
          setIsProcessingBg(false);
        }
      };

      const handleGlobalAutoTrim = useCallback(() => {
        if (!selectedFileItem) return;
        const targetFile = selectedFileItem;
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const l = pixels.data.length;
          let bound = { top: null, left: null, right: null, bottom: null };

          for (let i = 0; i < l; i += 4) {
            if (pixels.data[i + 3] !== 0) {
              const x = (i / 4) % canvas.width;
              const y = ~~((i / 4) / canvas.width);
              if (bound.top === null) bound.top = y;
              if (bound.left === null || x < bound.left) bound.left = x;
              if (bound.right === null || x > bound.right) bound.right = x;
              if (bound.bottom === null || y > bound.bottom) bound.bottom = y;
            }
          }

          if (bound.top !== null) {
            const trimWidth = bound.right - bound.left + 1;
            const newScale = OUTPUT_WIDTH / trimWidth;
            setGlobalScale(newScale);
            setGlobalPosition({
              x: -bound.left * newScale,
              y: OUTPUT_HEIGHT - bound.bottom * newScale
            });
          }
        };
        img.src = targetFile.preview;
      }, [selectedFileItem]);

      const handleGlobalFitBottom = useCallback(() => {
        if (!selectedFileItem) return;
        const img = new Image();
        img.onload = () => {
          const newScale = OUTPUT_WIDTH / img.width;
          setGlobalScale(newScale);
          setGlobalPosition({
            x: (OUTPUT_WIDTH - img.width * newScale) / 2,
            y: OUTPUT_HEIGHT - img.height * newScale
          });
        };
        img.src = selectedFileItem.preview;
      }, [selectedFileItem]);

      useEffect(() => {
        if (files.length > 0 && !isInitialized) {
          setIsInitialized(true);
          handleGlobalFitBottom();
        }
      }, [files, isInitialized, handleGlobalFitBottom]);

      const handleFileChange = (e) => {
        const selectedFiles = Array.from(e.target.files);
        if (selectedFiles.length === 0) return;
        
        const newFiles = selectedFiles.map(file => ({
          id: Math.random().toString(36).substring(7),
          file,
          preview: URL.createObjectURL(file)
        }));
        
        setFiles(prev => {
          const updatedFiles = [...prev, ...newFiles];
          if (!selectedFileId && updatedFiles.length > 0) {
            setSelectedFileId(updatedFiles[0].id);
          }
          return updatedFiles;
        });
        
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const removeFile = (id) => {
        setFiles(prev => prev.filter(f => f.id !== id));
        delete getBlobFns.current[id];
        if (files.length <= 1) setIsInitialized(false);
      };

      const handleRefFileChange = (e) => {
        const selectedFiles = Array.from(e.target.files).slice(0, 3 - refFiles.length);
        if (selectedFiles.length === 0) return;

        selectedFiles.forEach((file) => {
          const preview = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            // ✅ 비교용 이미지가 가로 480, 세로 720 박스 안에 "완벽하게 들어가도록" 리사이징 비율 계산
            const scaleX = OUTPUT_WIDTH / img.width;
            const scaleY = OUTPUT_HEIGHT / img.height;
            const scale = Math.min(scaleX, scaleY);
            
            const posX = (OUTPUT_WIDTH - img.width * scale) / 2;
            const posY = OUTPUT_HEIGHT - img.height * scale;

            setRefFiles(prev => {
              let defaultOffset = 480; 
              if (prev.length === 1) defaultOffset = 0;
              if (prev.length === 2) defaultOffset = -240;

              return [...prev, {
                id: Math.random().toString(36).substring(7),
                file, preview, width: img.width, height: img.height,
                scale, posX, posY, opacity: 0.6, offsetX: defaultOffset
              }];
            });
          };
          img.src = preview;
        });
        if (refInputRef.current) refInputRef.current.value = '';
      };

      const updateRef = (id, key, value) => setRefFiles(prev => prev.map(r => r.id === id ? { ...r, [key]: value } : r));
      const removeRef = (id) => setRefFiles(prev => prev.filter(r => r.id !== id));

      const downloadSingle = (res) => {
        if (!res || !res.blob) return;
        const url = URL.createObjectURL(res.blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `cropped_${res.name}`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const downloadAll = async () => {
        if (!isZipLoaded || files.length === 0) return;
        setIsDownloading(true); 
        const zip = new window.JSZip();
        
        const promises = files.map(fileItem => {
          const fn = getBlobFns.current[fileItem.id];
          return fn ? fn() : null;
        });

        try {
          const results = await Promise.all(promises);
          let hasValidImage = false;
          results.forEach((res) => {
            if (res && res.blob) {
              hasValidImage = true;
              zip.file(`cropped_${res.name}`, res.blob);
            }
          });

          if (hasValidImage) {
            const content = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Crop_Standing.zip';
            a.click();
            URL.revokeObjectURL(url);
          }
        } catch (e) {
          console.error("ZIP 생성 오류:", e);
        } finally {
          setIsDownloading(false); 
        }
      };

      return (
        <div className="flex flex-col md:flex-row h-screen w-full bg-[#eef0f2] overflow-hidden text-gray-900">
          
          {/* ✅ 사이드바 흑백 테마 적용 및 컴팩트화 */}
          <div className="md:py-5 md:pl-5 w-full md:w-[300px] h-auto md:h-full flex-shrink-0 relative z-10 overflow-visible">
            <aside className="w-full bg-white/95 backdrop-blur-md md:rounded-3xl flex flex-col h-[50vh] md:h-full shadow-[0_8px_30px_rgb(0,0,0,0.06)] border-b md:border border-gray-200/60 overflow-hidden">
              
              <div className="p-4 md:p-5 border-b border-gray-100 bg-white flex-shrink-0">
                <h1 className="text-lg md:text-xl font-black text-black tracking-tight flex items-center gap-1.5">
                  <span className="text-black">✂️</span> CCFolia 스탠딩 크롭기
                </h1>
              </div>

              <div className="flex-1 overflow-y-auto p-4 md:p-5 flex flex-col gap-5 custom-scrollbar">
                
                {/* 1. 파일 업로드 */}
                <div className="space-y-2">
                  <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">1. 파일 업로드</h3>
                  <button 
                    onClick={() => fileInputRef.current?.click()}
                    className="w-full flex items-center justify-center gap-1.5 bg-gray-100 text-black border border-gray-300 hover:bg-gray-200 py-2.5 rounded-xl transition-all font-bold text-sm"
                  >
                    <Icon path="M12 4v16m8-8H4" className="w-4 h-4" /> 이미지 추가하기
                  </button>
                  <input ref={fileInputRef} type="file" multiple accept="image/png, image/jpeg, image/webp" onChange={handleFileChange} className="hidden" />
                  
                  <button 
                    onClick={handleRemoveWhiteBackground}
                    disabled={files.length === 0 || isProcessingBg}
                    className={`w-full flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs font-semibold transition-all border ${
                      files.length > 0 && !isProcessingBg
                        ? 'bg-gray-800 text-white border-gray-800 hover:bg-black' 
                        : 'bg-gray-50 text-gray-400 border-gray-200 cursor-not-allowed'
                    }`}
                  >
                    {isProcessingBg ? "⏳ 배경 지우는 중..." : <><Icon path="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" className="w-3.5 h-3.5" /> 흰색 배경 지우기</>}
                  </button>
                </div>

                {/* 2. 테두리 효과 */}
                <div className={`space-y-2 ${files.length === 0 ? 'opacity-30 pointer-events-none' : ''}`}>
                  <div className="flex justify-between items-center">
                    <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">2. 둥근 테두리 (Outline)</h3>
                  </div>
                  <div className="bg-gray-50 border border-gray-200 rounded-xl p-3 space-y-3">
                    <div className="flex justify-between items-center text-xs font-bold text-gray-800">
                      <span>두께</span>
                      <span className="text-black bg-white border border-gray-300 px-1.5 py-0.5 rounded min-w-[2rem] text-center">{outlineThickness}px</span>
                    </div>
                    <input 
                      type="range" min="0" max="30" step="1" 
                      value={outlineThickness} onChange={(e) => setOutlineThickness(parseInt(e.target.value))}
                      className="w-full h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-black hover:accent-gray-800"
                    />
                    <div className="flex justify-between items-center text-xs font-bold text-gray-800 pt-1">
                      <span>색상</span>
                      <label className="flex items-center gap-1.5 cursor-pointer">
                        <span className="text-[10px] font-mono text-gray-500">{outlineColor.toUpperCase()}</span>
                        <div className="relative w-5 h-5 rounded-full border border-gray-400 shadow-sm overflow-hidden" style={{ backgroundColor: outlineColor }}>
                          <input type="color" value={outlineColor} onChange={e => setOutlineColor(e.target.value)} className="absolute opacity-0 w-10 h-10 -top-2 -left-2 cursor-pointer" />
                        </div>
                      </label>
                    </div>
                  </div>
                </div>

                {/* 3. 위치 및 크기 조절 */}
                <div className={`space-y-3 ${files.length === 0 ? 'opacity-30 pointer-events-none' : ''}`}>
                  <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">3. 조절</h3>
                  
                  <button 
                    onClick={handleGlobalAutoTrim}
                    className="w-full flex items-center justify-center gap-1.5 bg-black text-white hover:bg-gray-800 py-2.5 rounded-xl transition-all font-bold text-sm shadow-sm"
                  >
                    <Icon path="M13 10V3L4 14h7v7l9-11h-7z" className="w-4 h-4 text-gray-200" /> 일괄 투명 여백 제거
                  </button>
                  <button 
                    onClick={handleGlobalFitBottom}
                    className="w-full flex items-center justify-center gap-1.5 bg-white text-black border border-gray-300 hover:bg-gray-100 py-2 rounded-xl transition-all font-semibold text-sm"
                  >
                    <Icon path="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" className="w-4 h-4"/> 위치 초기화
                  </button>

                  <div className="pt-2 space-y-2">
                    <div className="flex justify-between items-center text-xs font-bold text-gray-800">
                      <span>크기 변경</span>
                      <div className="flex items-center gap-1.5">
                        <button onClick={() => handleGlobalScaleUpdate(1)} className="text-[9px] bg-gray-200 hover:bg-gray-300 text-black px-1.5 py-0.5 rounded border border-gray-300">100%</button>
                        <span className="text-black bg-gray-100 border border-gray-200 px-1.5 py-0.5 rounded min-w-[2.5rem] text-center">{(globalScale * 100).toFixed(0)}%</span>
                      </div>
                    </div>
                    <input 
                      type="range" min="0.1" max="3" step="0.01" 
                      value={globalScale} onChange={(e) => handleGlobalScaleUpdate(parseFloat(e.target.value))}
                      className="w-full h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-black hover:accent-gray-800"
                    />
                  </div>
                </div>

                {/* 4. 비교용 스탠딩 컴팩트 UI */}
                <div className="space-y-2 pb-2">
                  <div className="flex justify-between items-center">
                    <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">4. 스탠딩 비교</h3>
                    <span className="text-[9px] font-bold text-black bg-gray-200 px-1.5 py-0.5 rounded">{refFiles.length} / 3</span>
                  </div>
                  
                  {refFiles.length < 3 && (
                    <button 
                      onClick={() => refInputRef.current?.click()}
                      className="w-full flex items-center justify-center gap-1.5 bg-white text-black border border-gray-300 hover:bg-gray-100 py-2 rounded-lg transition-all font-bold text-[13px]"
                    >
                      <Icon path="M12 4v16m8-8H4" className="w-3.5 h-3.5" /> 비교용 이미지 추가
                    </button>
                  )}
                  <input ref={refInputRef} type="file" multiple accept="image/png, image/jpeg, image/webp" onChange={handleRefFileChange} className="hidden" />

                  <div className="space-y-2">
                    {refFiles.map((ref, idx) => (
                      <div key={ref.id} className="p-2.5 bg-gray-50 border border-gray-300 rounded-xl space-y-2 relative group">
                        <button onClick={() => removeRef(ref.id)} className="absolute top-1.5 right-1.5 p-1 text-gray-500 hover:text-black hover:bg-gray-200 rounded" title="삭제">
                          <Icon path="M6 18L18 6M6 6l12 12" className="w-3 h-3" />
                        </button>
                        
                        <div className="flex items-center gap-1.5 pr-6">
                          <span className="flex items-center justify-center w-4 h-4 bg-gray-200 text-black rounded font-bold text-[10px]">{idx + 1}</span>
                          <span className="text-[11px] font-bold text-gray-800 truncate block">{ref.file.name}</span>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-3">
                          <div className="space-y-1">
                            <div className="flex justify-between text-[9px] font-bold text-gray-600">
                              <span>투명도</span><span>{Math.round(ref.opacity * 100)}%</span>
                            </div>
                            <input type="range" min="0" max="1" step="0.05" value={ref.opacity} onChange={(e) => updateRef(ref.id, 'opacity', parseFloat(e.target.value))} className="w-full h-1 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-black" />
                          </div>
                          <div className="space-y-1">
                            <div className="flex justify-between text-[9px] font-bold text-gray-600">
                              <span>좌우</span><span>{ref.offsetX}px</span>
                            </div>
                            <input type="range" min="-480" max="1000" step="10" value={ref.offsetX} onChange={(e) => updateRef(ref.id, 'offsetX', parseInt(e.target.value))} className="w-full h-1 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-black" />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

              </div>

              <div className="p-3 md:p-4 border-t border-gray-200 bg-gray-100 flex-shrink-0">
                <button 
                  onClick={downloadAll}
                  disabled={!isZipLoaded || files.length === 0 || isDownloading}
                  className={`w-full py-3 rounded-xl font-bold text-white flex items-center justify-center gap-1.5 transition-all text-sm ${
                    files.length > 0 && isZipLoaded && !isDownloading
                      ? 'bg-black hover:bg-gray-800 shadow-md hover:-translate-y-0.5' 
                      : 'bg-gray-400 cursor-not-allowed text-gray-200'
                  }`}
                >
                  {isDownloading ? "⏳ 압축 중..." : <><Icon path="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" className="w-4 h-4"/> {files.length > 0 ? `ZIP 저장 (${files.length}장)` : '이미지 추가 필요'}</>}
                </button>
              </div>
            </aside>
          </div>

          <main className="flex-1 h-full overflow-y-auto p-4 lg:p-6 flex flex-col gap-5 lg:gap-6 relative">
            <GamePreview 
              fileItem={selectedFileItem} 
              scale={globalScale} 
              position={globalPosition} 
              onPositionChange={setGlobalPosition}
              onScaleChange={handleGlobalScaleUpdate} 
              outlineThickness={outlineThickness}
              outlineColor={outlineColor}
              refFiles={refFiles}
            />

            {files.length > 0 && (
              <div className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-gray-200 mb-10">
                <h2 className="text-base font-bold text-gray-900 mb-4 flex items-center gap-2">
                  출력 대기열 <span className="text-white bg-black px-2 py-0.5 rounded-full text-xs">{files.length}</span>
                </h2>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-3 md:gap-4">
                  {files.map(fileItem => (
                    <ImageItem 
                      key={fileItem.id} 
                      fileItem={fileItem}
                      scale={globalScale}
                      position={globalPosition}
                      isSelected={selectedFileId === fileItem.id}
                      onSelect={() => setSelectedFileId(fileItem.id)}
                      onRemove={removeFile}
                      onDownload={downloadSingle}
                      registerGetBlob={registerGetBlob}
                      outlineThickness={outlineThickness}
                      outlineColor={outlineColor}
                    />
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
